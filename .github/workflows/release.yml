name: Release

# Publishes to PyPI when a GitHub Release is published. Uses PyPI Trusted
# Publishing (OIDC) — no API token is stored in the repository. One-time
# setup on PyPI: add a trusted publisher for this repo pointing at workflow
# `release.yml` and environment `pypi`.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/fleetpull/
    permissions:
      # Required for OIDC trusted publishing; grants nothing else.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
